<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>RRS Trainer — Racing Rules Drills</title>
<meta name="description" content="Drill the Racing Rules of Sailing through decision moments. 2025–2028 rules.">
<meta name="theme-color" content="#0a1826">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:#0a1826; color:#e8f0f7;
    display:flex; flex-direction:column; align-items:center;
    overscroll-behavior:none; touch-action:manipulation;
  }
  #app { width:100%; max-width:560px; min-height:100dvh; display:flex; flex-direction:column;
         padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }

  header { display:flex; align-items:center; justify-content:space-between;
           padding:10px 14px 6px; }
  header h1 { font-size:15px; font-weight:700; letter-spacing:.06em; color:#9fb8cc; }
  header h1 span { color:#e8f0f7; }
  .chips { display:flex; gap:8px; align-items:center; }
  .chip { font-size:12px; font-weight:600; background:#12283c; border:1px solid #1e3a52;
          border-radius:999px; padding:5px 10px; color:#bcd2e4; }
  .chip.btn { cursor:pointer; }
  .chip.btn:active { transform:scale(.95); }

  #diagramWrap { position:relative; padding:2px 10px 0; }
  svg#dia { width:100%; height:auto; max-height:50dvh; display:block; border-radius:16px;
            background: radial-gradient(120% 90% at 50% 0%, #0e2438 0%, #0a1c2e 60%, #081624 100%);
            border:1px solid #16324a; }
  #situTitle { text-align:center; font-size:13px; color:#8fa9bf; padding:8px 16px 2px;
               font-weight:600; min-height:20px; }

  #qa { flex:1; display:flex; flex-direction:column; padding:6px 14px 14px; }
  .prompt { font-size:15.5px; line-height:1.4; font-weight:600; padding:6px 2px 12px; }
  .prompt .stage { display:inline-block; font-size:11px; font-weight:800; letter-spacing:.08em;
        color:#67e0a3; margin-right:6px; vertical-align:1px; }
  .opts { display:flex; flex-direction:column; gap:9px; }
  button.opt {
    font:inherit; font-size:15px; font-weight:600; text-align:left; color:#e8f0f7;
    background:#12283c; border:1.5px solid #1e3a52; border-radius:14px;
    padding:14px 14px; min-height:52px; cursor:pointer;
    transition: transform .06s, border-color .15s, background .15s;
  }
  button.opt:active { transform:scale(.98); }
  button.opt.picked { border-color:#67b7e0; background:#153450; }
  button.opt.correct { border-color:#3ddc84; background:#123a2a; }
  button.opt.wrong { border-color:#ff6b6b; background:#3a1520; }
  .rowopts { flex-direction:row; }
  .rowopts button.opt { flex:1; text-align:center; font-size:17px; font-weight:700; min-height:60px; }
  .rowopts .swatch { display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:7px; }

  #ruling { display:none; flex-direction:column; gap:10px; }
  .verdictline { display:flex; gap:8px; align-items:flex-start; font-size:14.5px; line-height:1.35; }
  .verdictline .mark { font-weight:900; font-size:15px; width:20px; flex:none; }
  .ok .mark { color:#3ddc84; } .bad .mark { color:#ff6b6b; }
  .verdictline b { color:#fff; }
  .umpire {
    background:#0f2033; border:1px solid #1e3a52; border-left:4px solid #67e0a3;
    border-radius:12px; padding:12px 13px; font-size:14.5px; line-height:1.5; color:#d5e4f0;
  }
  .umpire .who { font-size:11px; font-weight:800; letter-spacing:.1em; color:#67e0a3; display:block; margin-bottom:5px;}
  .cost { background:#20141b; border:1px solid #4a1e2e; border-left:4px solid #ff6b6b;
          border-radius:12px; padding:10px 13px; font-size:13.5px; line-height:1.45; color:#e9c9d0; }
  .cost b { color:#ffb3b3; font-size:11px; letter-spacing:.1em; }
  .rulechips { display:flex; flex-wrap:wrap; gap:6px; }
  .rulechip { font-size:11.5px; font-weight:700; color:#9fd4ff; background:#10293e;
              border:1px solid #274b68; padding:4px 9px; border-radius:999px; }
  button.next {
    font:inherit; font-size:17px; font-weight:800; color:#06263c;
    background:#67e0a3; border:none; border-radius:14px; padding:15px; margin-top:4px;
    cursor:pointer; letter-spacing:.03em;
  }
  button.next:active { transform:scale(.98); }

  /* stats overlay */
  #stats { position:fixed; inset:0; background:#050c14; z-index:50; display:none;
           overflow-y:auto; }
  #stats .inner { max-width:560px; margin:0 auto; padding:20px 18px 40px; }
  #stats h2 { font-size:18px; margin-bottom:4px; }
  #stats .sub { color:#8fa9bf; font-size:13px; margin-bottom:16px; }
  .bignums { display:flex; gap:10px; margin-bottom:18px; }
  .bignum { flex:1; background:#0f2033; border:1px solid #1e3a52; border-radius:12px; padding:12px; }
  .bignum .v { font-size:24px; font-weight:800; }
  .bignum .l { font-size:11px; color:#8fa9bf; letter-spacing:.05em; margin-top:2px; }
  .rulerow { margin-bottom:12px; }
  .rulerow .top { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
  .rulerow .name { font-weight:700; }
  .rulerow .pct { color:#bcd2e4; font-variant-numeric:tabular-nums; }
  .rulerow .weak { color:#ffb3b3; font-weight:700; font-size:11px; margin-left:6px; }
  .meter { height:8px; background:#122a40; border-radius:4px; overflow:hidden; }
  .meter i { display:block; height:100%; background:#5aa9dd; border-radius:4px; }
  #stats .closebar { margin-top:22px; display:flex; gap:10px; }
  #stats button { flex:1; font:inherit; font-size:15px; font-weight:700; padding:13px;
      border-radius:12px; border:1px solid #1e3a52; background:#12283c; color:#e8f0f7; cursor:pointer; }
  #stats button.danger { color:#ffb3b3; border-color:#4a1e2e; background:#20141b; }
  .gapnote { background:#10293e; border:1px solid #274b68; border-radius:12px; padding:11px 13px;
             font-size:13px; line-height:1.45; color:#cfe4f5; margin-bottom:18px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>RRS <span>TRAINER</span></h1>
    <div class="chips">
      <div class="chip" id="scoreChip">0 / 0</div>
      <div class="chip btn" id="statsBtn">Stats</div>
    </div>
  </header>
  <div id="diagramWrap">
    <svg id="dia" viewBox="0 0 100 130" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <div id="situTitle"></div>
  <div id="qa">
    <div id="q1block">
      <div class="prompt"><span class="stage">DECISION</span><span id="q1text"></span></div>
      <div class="opts" id="q1opts"></div>
    </div>
    <div id="q2block" style="display:none">
      <div class="prompt"><span class="stage">RIGHT OF WAY</span><span id="q2text"></span></div>
      <div class="opts rowopts" id="q2opts"></div>
    </div>
    <div id="ruling">
      <div class="verdictline" id="v1"><span class="mark"></span><span class="txt"></span></div>
      <div class="verdictline" id="v2"><span class="mark"></span><span class="txt"></span></div>
      <div class="rulechips" id="rulechips"></div>
      <div class="umpire"><span class="who">UMPIRE</span><span id="umpText"></span></div>
      <div class="cost"><b>WHAT IT COSTS&nbsp;&nbsp;</b><span id="costText"></span></div>
      <button class="next" id="nextBtn">NEXT SITUATION</button>
    </div>
  </div>
</div>

<div id="stats"><div class="inner">
  <h2>Your weak spots</h2>
  <div class="sub">Rules you miss show up more often. Accuracy counts both the decision and the right-of-way call.</div>
  <div class="bignums">
    <div class="bignum"><div class="v" id="stTotal">0</div><div class="l">SITUATIONS PLAYED</div></div>
    <div class="bignum"><div class="v" id="stAcc">–</div><div class="l">ACCURACY</div></div>
    <div class="bignum"><div class="v" id="stGap">0</div><div class="l">RIGHT MOVE, WRONG WHY</div></div>
  </div>
  <div class="gapnote" id="gapNote" style="display:none"></div>
  <div id="ruleRows"></div>
  <div class="closebar">
    <button class="danger" id="resetBtn">Reset progress</button>
    <button id="closeStats">Back to drills</button>
  </div>
</div></div>

<script src="situations.js"></script>
<script>
"use strict";
const SITS = window.SITUATIONS;
const $ = id => document.getElementById(id);
const SVGNS = "http://www.w3.org/2000/svg";

/* ---------- rule metadata ---------- */
const RULE_LABEL = {
  "10":"Rule 10 — Port / Starboard", "11":"Rule 11 — Windward / Leeward",
  "12":"Rule 12 — Clear Astern", "13":"Rule 13 — While Tacking",
  "14":"Rule 14 — Avoiding Contact", "15":"Rule 15 — Acquiring Right of Way",
  "16.1":"Rule 16.1 — Changing Course", "16.2":"Rule 16.2 — Bearing Away on a Beat",
  "17":"Rule 17 — Proper Course",
  "18.1a":"Rule 18.1 — When 18 Applies", "18.2a":"Rule 18.2(a) — Mark-Room",
  "18.2b":"Rule 18.2(b) — Mark-Room Ends", "18.2c":"Rule 18.2(c) — Mark-Room",
  "18.2e":"Rule 18.2(e) — Doubt", "18.3":"Rule 18.3 — Tacking in the Zone",
  "18.4":"Rule 18.4 — Gybing at a Mark", "19.2a":"Rule 19.2(a) — Obstruction",
  "19.2b":"Rule 19.2(b) — Room at Obstruction", "20":"Rule 20 — Room to Tack",
  "21.1":"Rule 21.1 — Returning to Start", "21.3":"Rule 21.3 — Moving Astern",
  "31":"Rule 31 — Touching a Mark", "43.1b":"Rule 43.1(b) — Exoneration",
  "44":"Rule 44 — Penalties", "SecC":"Section C Preamble — Starting Marks"
};
const FAMILY = t => t.startsWith("18") ? "18" : t.startsWith("19") ? "19"
  : t.startsWith("21") ? "21" : t.startsWith("16") ? "16" : t.startsWith("43") ? "43"
  : t === "SecC" ? "18" : t;
const FAMILY_LABEL = {
  "10":"R10 Port/Starboard","11":"R11 Windward/Leeward","12":"R12 Clear Astern",
  "13":"R13 Tacking","14":"R14 Contact","15":"R15 Acquiring ROW","16":"R16 Changing Course",
  "17":"R17 Proper Course","18":"R18 Mark-Room","19":"R19 Obstructions","20":"R20 Room to Tack",
  "21":"R21 Start Errors","31":"R31 Touching Marks","43":"R43 Exoneration"
};

/* ---------- persistent state ---------- */
const KEY = "rrs-trainer-v1";
let S = { rules:{}, played:0, correct:0, gap:0, history:[], recent:[] };
try { const raw = localStorage.getItem(KEY); if (raw) S = Object.assign(S, JSON.parse(raw)); } catch(e){}
const save = () => { try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e){} };

/* ---------- situation picking (weak rules come back more) ---------- */
function ruleAcc(f){ const r = S.rules[f]; return r && r.n ? r.c/r.n : null; }
function pickSituation(){
  const weights = SITS.map(sit => {
    if (S.recent.includes(sit.id)) return 0.05;
    const fams = [...new Set(sit.answer.rules.map(FAMILY))];
    let w = 1;
    for (const f of fams){
      const a = ruleAcc(f);
      if (a === null) w += 1.2;          // unseen rules: explore
      else w += 2.5 * (1 - a);           // weak rules: exploit
    }
    return w;
  });
  let sum = weights.reduce((a,b)=>a+b,0), r = Math.random()*sum;
  for (let i=0;i<SITS.length;i++){ r -= weights[i]; if (r<=0) return SITS[i]; }
  return SITS[SITS.length-1];
}

/* ---------- geometry ---------- */
const rad = d => d*Math.PI/180;
const dirv = h => [Math.sin(rad(h)), -Math.cos(rad(h))];

/* ---------- diagram ---------- */
const TACK_COLOR = { starboard:"#33d17a", port:"#ff5c5c" };
function el(tag, attrs, parent){
  const e = document.createElementNS(SVGNS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(e);
  return e;
}
function boatGroup(b, isYou, animFrom){
  const g = el("g", {class:"boat"});
  const hull = el("g", {}, g);
  const L = 7, W = 2.6;
  // hull: pointed bow, rounded transom (local coords, bow up)
  el("path", {
    d:`M0 ${-L/2} C ${W/2} ${-L/6} ${W/2} ${L/3} ${W/2.6} ${L/2}
       L ${-W/2.6} ${L/2} C ${-W/2} ${L/3} ${-W/2} ${-L/6} 0 ${-L/2} Z`,
    fill: TACK_COLOR[b.tack] || "#9fb8cc",
    stroke: isYou ? "#ffffff" : "#0a1826", "stroke-width": isYou ? 0.7 : 0.4
  }, hull);
  // sail/boom line toward leeward side
  const boomSide = b.tack === "starboard" ? -1 : 1; // boom on side opposite the wind
  el("path", {
    d:`M0 ${-L/6} L ${boomSide*W*0.9} ${L/4}`,
    stroke:"#eaf4fb", "stroke-width":0.55, fill:"none", "stroke-linecap":"round"
  }, hull);
  // heading tick at bow
  el("path", {d:`M0 ${-L/2} L0 ${-L/2-2.2}`, stroke:"#eaf4fb", "stroke-width":0.45,
    "stroke-dasharray":"0.9 0.7"}, hull);
  hull.setAttribute("transform", `rotate(${b.heading})`);
  // label under boat (not rotated)
  const label = el("text", {y: 6.4, "text-anchor":"middle",
    "font-size": isYou ? 3.2 : 3.0, "font-weight":"800",
    fill: isYou ? "#ffffff" : "#bcd2e4",
    stroke:"#0a1826", "stroke-width":0.55, "paint-order":"stroke"}, g);
  label.textContent = isYou ? "YOU" : b.id;
  g.dataset.x0 = animFrom ? animFrom[0] : b.x;
  g.dataset.y0 = animFrom ? animFrom[1] : b.y;
  g.dataset.x1 = b.x; g.dataset.y1 = b.y;
  g.setAttribute("transform", `translate(${g.dataset.x0} ${g.dataset.y0})`);
  return g;
}
function sternAbeam(b){
  const d = dirv(b.heading), L=7;
  const sx = b.x - d[0]*L/2, sy = b.y - d[1]*L/2;
  const p = [-d[1], d[0]]; // perpendicular
  return {x1: sx - p[0]*16, y1: sy - p[1]*16, x2: sx + p[0]*16, y2: sy + p[1]*16};
}
let animId = 0;
function sceneBox(sit){
  // fit the viewBox to what's actually in the scene
  let xs = [], ys = [];
  const add = (x,y) => { xs.push(x); ys.push(y); };
  for (const b of sit.boats){
    add(b.x-7, b.y-7); add(b.x+7, b.y+8.5);
    if (b.ze){ add(b.ze[0]-7, b.ze[1]-7); add(b.ze[0]+7, b.ze[1]+8.5); }
    for (const t of (b.trail||[])) add(t[0], t[1]);
  }
  if (sit.mark){
    const r = (sit.mark.zone_radius||0) + 5;
    add(sit.mark.x-r, sit.mark.y-r); add(sit.mark.x+r, sit.mark.y+r);
    if (sit.mark.type === "start-boat"){ add(sit.mark.x-4, sit.mark.y-10); add(sit.mark.x+4, sit.mark.y+10); }
  }
  if (sit.obstruction){
    const o = sit.obstruction;
    if (o.kind === "shore"){ add(o.x-o.w, o.y); add(o.x+4, o.y+o.h); }
    else { add(o.x-6, o.y-8); add(o.x+6, o.y+9); }
  }
  for (const ln of (sit.lines||[])){ add(ln.x1, ln.y1-4); add(ln.x2, ln.y2-4); }
  let minx = Math.min(...xs)-5, maxx = Math.max(...xs)+5;
  let miny = Math.min(...ys)-4, maxy = Math.max(...ys)+4;
  // room for the wind arrow band on top
  miny -= 13;
  let w = maxx-minx, h = maxy-miny;
  // keep sane proportions for the canvas (avoid extreme slivers)
  const minW = 55, minH = 62;
  if (w < minW){ const d=(minW-w)/2; minx-=d; w=minW; }
  if (h < minH){ const d=(minH-h)/2; miny-=d; h=minH; }
  return {minx, miny, w, h};
}
function drawSituation(sit){
  cancelAnimationFrame(animId);
  const svg = $("dia");
  svg.innerHTML = "";
  const vb = sceneBox(sit);
  svg.setAttribute("viewBox", `${vb.minx} ${vb.miny} ${vb.w} ${vb.h}`);
  const fs = Math.max(0.75, vb.w/100); // text scale factor relative to old canvas
  // wind arrow, centered at the top of the visible scene
  const wg = el("g", {}, svg);
  const wx = vb.minx + vb.w/2, wy = vb.miny + 3;
  el("path", {d:`M${wx} ${wy} L${wx} ${wy+7}`, stroke:"#7fd0ff", "stroke-width":1.1*fs, "stroke-linecap":"round"}, wg);
  el("path", {d:`M${wx-2.2*fs} ${wy+4.8} L${wx} ${wy+7.9} L${wx+2.2*fs} ${wy+4.8} Z`, fill:"#7fd0ff"}, wg);
  const wt = el("text", {x:wx+4.5*fs, y:wy+5.5, "font-size":3.4*fs, fill:"#7fd0ff", "font-weight":"700",
    "letter-spacing":".14em"}, wg);
  wt.textContent = "WIND";
  // faint water flecks
  for (let i=0;i<14;i++){
    el("circle", {cx:vb.minx+((i*37+13)%100)/100*vb.w, cy:vb.miny+12+((i*53+29)%100)/100*(vb.h-14),
      r:0.35, fill:"#1c3a52"}, svg);
  }
  // obstruction
  if (sit.obstruction){
    const o = sit.obstruction;
    if (o.kind === "shore"){
      el("rect", {x:o.x-o.w, y:o.y, width:o.w+4, height:o.h, rx:2, fill:"#233b2c",
        stroke:"#3a5c46", "stroke-width":0.5}, svg);
      const t = el("text", {x:o.x-o.w/2+2, y:o.y+o.h/2, "font-size":3, fill:"#7fae8f",
        "text-anchor":"middle", transform:`rotate(-90 ${o.x-o.w/2+2} ${o.y+o.h/2})`}, svg);
      t.textContent = "SHOAL";
    } else {
      const g = el("g", {transform:`translate(${o.x} ${o.y})`}, svg);
      const hull = el("g", {transform:`rotate(${o.heading||0})`}, g);
      el("path", {d:"M0 -3.5 C1.3 -1.2 1.3 2.3 1 3.5 L-1 3.5 C-1.3 2.3 -1.3 -1.2 0 -3.5 Z",
        fill:"#33d17a", opacity:0.85, stroke:"#0a1826", "stroke-width":0.4}, hull);
      const t = el("text", {y:7, "font-size":2.6, fill:"#7fae8f", "text-anchor":"middle"}, g);
      t.textContent = "obstruction";
    }
  }
  // lines (e.g. finish)
  for (const ln of (sit.lines||[])){
    el("line", {x1:ln.x1, y1:ln.y1, x2:ln.x2, y2:ln.y2, stroke:"#e8c15a",
      "stroke-width":0.6, "stroke-dasharray":"2.4 1.6"}, svg);
    const t = el("text", {x:(ln.x1+ln.x2)/2, y:ln.y1-2, "font-size":2.8, fill:"#e8c15a",
      "text-anchor":"middle", "font-weight":"700"}, svg);
    t.textContent = ln.kind.toUpperCase();
  }
  // mark + zone
  if (sit.mark){
    const m = sit.mark;
    if (m.zone_radius > 0){
      el("circle", {cx:m.x, cy:m.y, r:m.zone_radius, fill:"none", stroke:"#5aa9dd",
        "stroke-width":0.45, "stroke-dasharray":"2.2 2", opacity:0.75}, svg);
      const zt = el("text", {x:m.x, y:m.y-m.zone_radius-1.6, "font-size":2.7, fill:"#5aa9dd",
        "text-anchor":"middle", "font-weight":"700"}, svg);
      zt.textContent = "ZONE · 3 LENGTHS";
    }
    if (m.type === "start-boat"){
      const g = el("g", {transform:`translate(${m.x} ${m.y})`}, svg);
      el("path", {d:"M0 -4.5 C1.8 -1.5 1.8 3 1.4 4.5 L-1.4 4.5 C-1.8 3 -1.8 -1.5 0 -4.5 Z",
        fill:"#c9d6e2", stroke:"#0a1826", "stroke-width":0.4}, g);
      el("path", {d:"M0 -4.5 L0 -8 L3 -6.8 L0 -5.8 Z", fill:"#e8c15a"}, g);
      const t = el("text", {y:8, "font-size":2.6, fill:"#c9d6e2", "text-anchor":"middle",
        "font-weight":"700"}, g);
      t.textContent = "COMMITTEE";
    } else {
      el("circle", {cx:m.x, cy:m.y, r:1.7, fill:"#ffb347", stroke:"#0a1826", "stroke-width":0.4}, svg);
      el("circle", {cx:m.x, cy:m.y, r:0.55, fill:"#0a1826"}, svg);
      if (m.type === "offset"){
        const ot = el("text", {x:m.x, y:m.y+3.5, "font-size":2.6*fs, fill:"#ffb347",
          "text-anchor":"middle"}, svg);
        ot.textContent = "OFFSET";
      }
    }
  }
  // abeam line: only when overlap state matters (same-tack pair or downwind pair or zone facts)
  const pair = sit.facts.pairs[0];
  const boats = {}; sit.boats.forEach(b => boats[b.id]=b);
  const [pa, pb] = [boats[pair[0]], boats[pair[1]]];
  const showAbeam = sit.mark || sit.facts.overlap_from_clear_astern ||
    (pa.tack === pb.tack && !sit.facts.hail_room_to_tack);
  if (showAbeam && pa.tack === pb.tack || (showAbeam && sit.mark && sit.mark.type === "leeward")){
    // draw across the stern of the boat that's ahead (bow furthest along mean heading)
    const mh = dirv(pa.heading);
    const lead = ((pa.x*mh[0]+pa.y*mh[1]) > (pb.x*mh[0]+pb.y*mh[1])) ? pa : pb;
    const ab = sternAbeam(lead);
    el("line", {x1:ab.x1, y1:ab.y1, x2:ab.x2, y2:ab.y2, stroke:"#e8f0f7",
      "stroke-width":0.35, "stroke-dasharray":"1.4 1.2", opacity:0.55}, svg);
  }
  // zone-entry ghost hulls (under the real boats), plus one caption
  const L = 7, W = 2.6;
  const hullD = `M0 ${-L/2} C ${W/2} ${-L/6} ${W/2} ${L/3} ${W/2.6} ${L/2}
       L ${-W/2.6} ${L/2} C ${-W/2} ${L/3} ${-W/2} ${-L/6} 0 ${-L/2} Z`;
  const ghosts = sit.boats.filter(b => b.ze);
  for (const b of ghosts){
    const g = el("g", {transform:`translate(${b.ze[0]} ${b.ze[1]}) rotate(${b.heading})`,
      opacity:0.55}, svg);
    el("path", {d:hullD, fill:"none", stroke:TACK_COLOR[b.tack], "stroke-width":0.45,
      "stroke-dasharray":"1 0.9"}, g);
  }
  if (ghosts.length){
    const gx = ghosts.reduce((s,b)=>s+b.ze[0],0)/ghosts.length;
    const gy = Math.min(...ghosts.map(b=>b.ze[1])) - 5.5; // above the ghosts, clear of boats/labels
    const ct = el("text", {x:gx, y:gy, "font-size":2.7*fs, fill:"#8fa9bf",
      "font-weight":"600", "text-anchor":"middle"}, svg);
    ct.textContent = "at zone entry";
  }
  // trails + boats
  for (const b of sit.boats){
    if (b.trail){
      let dstr = `M${b.trail[0][0]} ${b.trail[0][1]}`;
      for (let i=1;i<b.trail.length;i++) dstr += ` L${b.trail[i][0]} ${b.trail[i][1]}`;
      dstr += ` L${b.x} ${b.y}`;
      el("path", {d:dstr, fill:"none", stroke:TACK_COLOR[b.tack], "stroke-width":0.4,
        "stroke-dasharray":"0.5 1.4", opacity:0.6}, svg);
    }
  }
  const groups = [];
  for (const b of sit.boats){
    const from = b.trail ? b.trail[0] : [b.x - dirv(b.heading)[0]*10, b.y - dirv(b.heading)[1]*10];
    const g = boatGroup(b, b.id === "you", from);
    svg.appendChild(g); groups.push(g);
  }
  // entrance animation ~1.4s then freeze at decision moment
  const t0 = performance.now(), DUR = 1400;
  const ease = t => t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
  function step(now){
    const t = Math.min(1, (now-t0)/DUR), k = ease(t);
    for (const g of groups){
      const x = (+g.dataset.x0) + ((+g.dataset.x1)-(+g.dataset.x0))*k;
      const y = (+g.dataset.y0) + ((+g.dataset.y1)-(+g.dataset.y0))*k;
      g.setAttribute("transform", `translate(${x} ${y})`);
    }
    if (t < 1) animId = requestAnimationFrame(step);
  }
  animId = requestAnimationFrame(step);
  svg.onclick = () => { cancelAnimationFrame(animId);
    for (const g of groups) g.setAttribute("transform", `translate(${g.dataset.x1} ${g.dataset.y1})`); };
}

/* ---------- quiz flow ---------- */
let cur = null, pick1 = null, pick2 = null;
function shuffle(a){ for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));
  [a[i],a[j]]=[a[j],a[i]]; } return a; }

function newSituation(){
  cur = pickSituation(); pick1 = pick2 = null;
  drawSituation(cur);
  $("situTitle").textContent = cur.title;
  $("q1text").textContent = cur.q1.prompt;
  const q1o = $("q1opts"); q1o.innerHTML = "";
  for (const o of shuffle([...cur.q1.options])){
    const b = document.createElement("button");
    b.className = "opt"; b.textContent = o.label; b.dataset.id = o.id;
    b.onclick = () => answer1(o.id, b);
    q1o.appendChild(b);
  }
  $("q1block").style.display = "";
  $("q2block").style.display = "none";
  $("ruling").style.display = "none";
  window.scrollTo({top:0});
}
function answer1(id, btn){
  if (pick1) return;
  pick1 = id;
  btn.classList.add("picked");
  const boats = {}; cur.boats.forEach(b => boats[b.id]=b);
  const q2o = $("q2opts"); q2o.innerHTML = "";
  $("q2text").textContent = cur.q2.prompt;
  for (const bid of cur.facts.pairs[0]){
    const b = document.createElement("button");
    b.className = "opt"; b.dataset.id = bid;
    const sw = `<span class="swatch" style="background:${TACK_COLOR[boats[bid].tack]}"></span>`;
    b.innerHTML = sw + (bid === "you" ? "YOU" : "Boat " + bid);
    b.onclick = () => answer2(bid, b);
    q2o.appendChild(b);
  }
  setTimeout(() => { $("q2block").style.display = "";
    $("q2block").scrollIntoView({behavior:"smooth", block:"nearest"}); }, 120);
}
function answer2(bid, btn){
  if (pick2) return;
  pick2 = bid;
  reveal();
}
function reveal(){
  const a1ok = pick1 === cur.q1.correct;
  const a2ok = pick2 === cur.q2.correct;
  // paint option buttons
  for (const b of $("q1opts").children){
    if (b.dataset.id === cur.q1.correct) b.classList.add("correct");
    else if (b.dataset.id === pick1) b.classList.add("wrong");
  }
  for (const b of $("q2opts").children){
    if (b.dataset.id === cur.q2.correct) b.classList.add("correct");
    else if (b.dataset.id === pick2) b.classList.add("wrong");
  }
  const optLabel = id => (cur.q1.options.find(o=>o.id===id)||{}).label || id;
  const boatLabel = id => id === "you" ? "YOU" : "Boat " + id;
  const v1 = $("v1"), v2 = $("v2");
  v1.className = "verdictline " + (a1ok ? "ok" : "bad");
  v1.querySelector(".mark").textContent = a1ok ? "✓" : "✗";
  v1.querySelector(".txt").innerHTML = a1ok
    ? `Right call: <b>${optLabel(cur.q1.correct)}</b>`
    : `You chose “${optLabel(pick1)}” — right call: <b>${optLabel(cur.q1.correct)}</b>`;
  v2.className = "verdictline " + (a2ok ? "ok" : "bad");
  v2.querySelector(".mark").textContent = a2ok ? "✓" : "✗";
  v2.querySelector(".txt").innerHTML = a2ok
    ? `Right of way: <b>${boatLabel(cur.q2.correct)}</b>`
    : `You said ${boatLabel(pick2)} — right of way: <b>${boatLabel(cur.q2.correct)}</b>`;
  const rc = $("rulechips"); rc.innerHTML = "";
  for (const r of cur.answer.rules){
    const c = document.createElement("span");
    c.className = "rulechip"; c.textContent = RULE_LABEL[r] || r;
    rc.appendChild(c);
  }
  $("umpText").textContent = cur.answer.explanation;
  $("costText").textContent = cur.answer.cost;
  $("ruling").style.display = "flex";
  setTimeout(()=>$("ruling").scrollIntoView({behavior:"smooth", block:"nearest"}), 100);
  // scoring
  S.played += 1;
  const credit = (a1ok?0.5:0) + (a2ok?0.5:0);
  S.correct += credit;
  if (a1ok && !a2ok) S.gap += 1;
  const fams = [...new Set(cur.answer.rules.map(FAMILY))];
  for (const f of fams){
    S.rules[f] = S.rules[f] || {n:0, c:0};
    S.rules[f].n += 1; S.rules[f].c += credit;
  }
  S.recent.push(cur.id); if (S.recent.length > 6) S.recent.shift();
  save();
  $("scoreChip").textContent = `${Math.round(S.correct*10)/10} / ${S.played}`;
}
$("nextBtn").onclick = newSituation;

/* ---------- stats ---------- */
$("statsBtn").onclick = () => {
  $("stTotal").textContent = S.played;
  $("stAcc").textContent = S.played ? Math.round(100*S.correct/S.played) + "%" : "–";
  $("stGap").textContent = S.gap;
  $("gapNote").style.display = S.gap >= 3 ? "" : "none";
  $("gapNote").textContent = `${S.gap} times you picked the right action for the wrong reason. ` +
    `That works until the geometry shifts. Watch the right-of-way question.`;
  const rows = $("ruleRows"); rows.innerHTML = "";
  const fams = Object.keys(S.rules).sort((a,b) =>
    (S.rules[a].c/S.rules[a].n) - (S.rules[b].c/S.rules[b].n));
  for (const f of fams){
    const r = S.rules[f], pct = Math.round(100*r.c/r.n);
    const div = document.createElement("div");
    div.className = "rulerow";
    div.innerHTML = `<div class="top"><span class="name">${FAMILY_LABEL[f]||f}` +
      (pct < 60 && r.n >= 2 ? `<span class="weak">WEAK</span>` : "") +
      `</span><span class="pct">${pct}% · ${r.n} drill${r.n===1?"":"s"}</span></div>` +
      `<div class="meter"><i style="width:${pct}%"></i></div>`;
    rows.appendChild(div);
  }
  if (!fams.length) rows.innerHTML = `<div class="sub">No drills yet — go sail.</div>`;
  $("stats").style.display = "block";
};
$("closeStats").onclick = () => $("stats").style.display = "none";
$("resetBtn").onclick = () => {
  if (confirm("Reset all progress?")){ S = {rules:{},played:0,correct:0,gap:0,history:[],recent:[]};
    save(); $("stats").style.display="none";
    $("scoreChip").textContent = "0 / 0"; }
};

/* ---------- PWA ---------- */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")){
  addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}

$("scoreChip").textContent = `${Math.round(S.correct*10)/10} / ${S.played}`;
newSituation();
</script>
